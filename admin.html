<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Home of Rest</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#12122e 100%);color:#eaeaea;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-container{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:2.5rem;max-width:400px;width:100%;text-align:center}
.logo{display:flex;align-items:center;justify-content:center;gap:0.5rem;text-decoration:none;color:#eaeaea;font-size:1.5rem;font-weight:700;margin-bottom:0.4rem}
.logo-icon{font-size:1.7rem}
.login-container h2{margin-bottom:0.3rem;font-size:1.3rem}
.login-container>p{color:#a0a0a0;margin-bottom:1.8rem;font-size:0.95rem}
.form-group{margin-bottom:1.1rem;text-align:left}
.form-group label{display:block;margin-bottom:0.4rem;font-size:0.88rem;font-weight:500}
.form-group input{width:100%;padding:0.8rem 1rem;border:1px solid rgba(255,255,255,0.12);border-radius:10px;background:rgba(255,255,255,0.05);color:#eaeaea;font-size:1rem;outline:none;transition:border-color .3s}
.form-group input:focus{border-color:#e94560}
.btn-login{width:100%;padding:0.9rem;background:linear-gradient(135deg,#e94560,#c73e54);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .3s,box-shadow .3s}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(233,69,96,0.35)}
.error-msg{color:#e94560;font-size:0.9rem;margin-top:1rem;display:none}
.back-link{display:inline-block;margin-top:1.2rem;color:#a0a0a0;text-decoration:none;font-size:0.88rem;transition:color .3s}
.back-link:hover{color:#fff}
</style>
</head>
<body>
<div class="login-container">
<a href="index.html" class="logo"><span class="logo-icon">&#128716;</span><span class="logo-text">Home of Rest</span></a>
<h2>Admin Login</h2>
<p>Enter your credentials to access the admin dashboard</p>
<form onsubmit="handleLogin(event)">
<div class="form-group"><label for="username">Username</label><input type="text" id="username" placeholder="Enter username" required></div>
<div class="form-group"><label for="password">Password</label><input type="password" id="password" placeholder="Enter password" required></div>
<button type="submit" class="btn-login">Sign In</button>
<p class="error-msg" id="error-msg"></p>
</form>
<a href="index.html" class="back-link">&larr; Back to Home</a>
</div>
<script>
function handleLogin(e){e.preventDefault();var u=document.getElementById('username').value,p=document.getElementById('password').value,err=document.getElementById('error-msg');if(u==='admin'&&p==='admin'){localStorage.setItem('adminLoggedIn','true');window.location.href='admin-dashboard.html'}else{err.style.display='block';err.textContent='Invalid username or password'}}
</script>
</body>
</html>
